<!DOCTYPE html>
<html lang="ko">
<head>
  <title>F1 Ranking Page</title>
  <meta charset="UTF-8" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body class="ranking-page">

  <header class="ranking-header">
    <div class="nav-bar">
      <div class="nav-left">
        <a href="Main.html" class="back-button">←</a>
      </div>
      <div class="nav-title">F1 Formula One World Championship 🏆</div>
    </div>
  
    <nav class="nav-tabs">
      <a href="#" class="nav-tab active">순위</a>
      <a href="Team.html" class="nav-tab">팀</a>
      <a href="Tec.html" class="nav-tab">기술력</a>
      <a href="Rule.html" class="nav-tab">진행</a>
    </nav>
  </header>

  <main class="ranking-container">
    <h2 class="ranking-title">Ranking</h2>

    <section class="point-section">
      <h3>드라이버 포인트 :</h3>
      <p>각 경기마다 드라이버 개인에게 포인트 부여</p>
      <p>→ <strong>챔피언 타이틀</strong> 경쟁을 위해 집계</p>
    </section>

    <section class="point-section">
      <h3>컨스트럭터 포인트 :</h3>
      <p>팀 소속 드라이버들이 획득한 합산 포인트</p>
      <p>→ <strong>팀 순위와 상금</strong>을 위해 집계</p>
    </section>

    <section class="table-section">
      <h3>현재 드라이버 순위</h3>
      <img src="images/driver_ranking.png" alt="드라이버 순위 표" class="ranking-img" />
    </section>

    <section class="table-section">
      <h3>현재 팀 순위</h3>
      <img src="images/team_ranking.png" alt="팀 순위 표" class="ranking-img" />
    </section>
  </main>

</body>
</html>
