<!DOCTYPE html>
<html lang="ko">
<head>
  <title>F1 Team Page</title>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="team-page">

  <header class="ranking-header">
    <div class="nav-bar">
      <div class="nav-left">
        <a href="Main.html" class="back-button">←</a>
      </div>
      <div class="nav-title">F1 Formula One World Championship 🏁</div>
    </div>

    <nav class="nav-tabs">
        <a href="Ranking.html" class="nav-tab">순위</a>
        <a href="#" class="nav-tab active">팀</a>
        <a href="Tec.html" class="nav-tab">기술력</a>
        <a href="Rule.html" class="nav-tab">진행</a>
      </nav>
  </header>

  <main class="team-container">
    <h2 class="team-title">Team</h2>
    <p class="team-description">이곳에서 응원하고 싶은 F1 팀들을 클릭하여 확인하세요!</p>

    <div class="team-grid">
      <!-- 팀별 블록 -->
      <div class="team-item">
        <img src="images/mclaren_car.png" alt="맥라렌" class="team-car">
        <div class="team-name">맥라렌</div>
      </div>
      <div class="team-item">
        <img src="images/ferrari_car.png" alt="페라리" class="team-car">
        <div class="team-name">페라리</div>
      </div>

      <div class="team-item">
        <img src="images/redbull_car.png" alt="레드불" class="team-car">
        <div class="team-name">레드불</div>
      </div>
      <div class="team-item">
        <img src="images/mercedes_car.png" alt="메르세데스" class="team-car">
        <div class="team-name">메르세데스</div>
      </div>

      <div class="team-item">
        <img src="images/astonmartin_car.png" alt="애스턴 마틴" class="team-car">
        <div class="team-name">애스턴 마틴</div>
      </div>
      <div class="team-item">
        <img src="images/alpine_car.png" alt="알핀" class="team-car">
        <div class="team-name">알핀</div>
      </div>

      <div class="team-item">
        <img src="images/haas_car.png" alt="하스" class="team-car">
        <div class="team-name">하스</div>
      </div>
      <div class="team-item">
        <img src="images/rb_car.png" alt="레이싱 불스" class="team-car">
        <div class="team-name">레이싱 불스</div>
      </div>

      <div class="team-item">
        <img src="images/williams_car.png" alt="윌리엄스" class="team-car">
        <div class="team-name">윌리엄스</div>
      </div>
      <div class="team-item">
        <img src="images/kick_car.png" alt="자우버" class="team-car">
        <div class="team-name">자우버</div>
      </div>
    </div>
  </main>

</body>
</html>
